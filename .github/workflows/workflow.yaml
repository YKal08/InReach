name: Main pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: 787587782604.dkr.ecr.eu-central-1.amazonaws.com
  BACKEND_REPO: hacktues12-backend
  FRONTEND_REPO: hacktues12-frontend
  BACKEND_DOCKERFILE_PATH: ./backend
  FRONTEND_DOCKERFILE_PATH: ./frontend

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  build-backend:
    name: Build & Push Spring Boot
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::787587782604:role/hacktues12-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: tags
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_tag=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "branch_tag=$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BACKEND_DOCKERFILE_PATH }}
          file: ${{ env.BACKEND_DOCKERFILE_PATH }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tags.outputs.sha_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tags.outputs.branch_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tags.outputs.timestamp }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Summary
        run: |
          echo "### Backend Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:** latest, ${{ steps.tags.outputs.sha_tag }}, ${{ steps.tags.outputs.branch_tag }}, ${{ steps.tags.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY

  build-frontend:
    name: Build & Push React Router
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::787587782604:role/hacktues12-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: tags
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_tag=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "branch_tag=$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_DOCKERFILE_PATH }}
          file: ${{ env.FRONTEND_DOCKERFILE_PATH }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tags.outputs.sha_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tags.outputs.branch_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tags.outputs.timestamp }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Summary
        run: |
          echo "### Frontend Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:** latest, ${{ steps.tags.outputs.sha_tag }}, ${{ steps.tags.outputs.branch_tag }}, ${{ steps.tags.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
