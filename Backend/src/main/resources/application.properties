# * JPA / HIBERNATE SETTINGS
# ! DANGER: 'update' is excellent for development as it syncs Java classes to DB tables automatically.
# ! TODO: Change to 'validate' or 'none' in a production environment to prevent accidental data loss.
spring.jpa.hibernate.ddl-auto=update

# ? Enables console output of the raw SQL queries being generated by Hibernate.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# * LOGGING & TROUBLESHOOTING
# ? DEBUG level allows you to see the internal Spring Security filter chain decisions in the console.
# ? Very helpful for identifying why a JWT might be getting rejected.
